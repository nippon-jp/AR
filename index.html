<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR.FLASH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Sans',sans-serif;}

/* HOME */
#home{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#0a1628 0%,#000 70%);
  transition:opacity .4s,transform .4s;
}
#home.hide{opacity:0;transform:scale(1.04);pointer-events:none;}

.logo-wrap{text-align:center;margin-bottom:52px;}
.logo-main{
  font-family:'DM Mono',monospace;
  font-size:clamp(2.8rem,10vw,4.2rem);font-weight:500;
  letter-spacing:-.02em;color:#fff;line-height:1;
}
.logo-main em{font-style:normal;color:#00ffe0;}
.logo-sub{
  margin-top:10px;font-size:.8rem;font-weight:300;
  letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35);
}

.btn-sample{
  width:min(320px,88vw);padding:20px 24px;
  background:linear-gradient(135deg,#00ffe0,#00b8a9);
  border:none;border-radius:16px;color:#000;
  font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;
  letter-spacing:.04em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:0 0 40px rgba(0,255,224,.3),0 8px 32px rgba(0,0,0,.5);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.btn-sample::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);border-radius:inherit;}
.btn-sample:active{transform:scale(.97);box-shadow:0 0 20px rgba(0,255,224,.2);}
.btn-sample .s-icon{font-size:1.6rem;line-height:1;}
.btn-sample .s-label{text-align:left;}
.btn-sample .s-main{display:block;font-size:1rem;}
.btn-sample .s-sub{display:block;font-size:.68rem;opacity:.6;letter-spacing:.06em;margin-top:2px;}

.divider{display:flex;align-items:center;gap:12px;width:min(320px,88vw);margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.divider span{font-size:.72rem;color:rgba(255,255,255,.25);letter-spacing:.1em;}

.btn-upload{
  width:min(320px,88vw);padding:16px 24px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);
  border-radius:16px;color:rgba(255,255,255,.7);
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:400;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;
}
.btn-upload:active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);}
#fileInput{display:none;}

.hint{
  margin-top:28px;font-size:.7rem;
  color:rgba(255,255,255,.18);letter-spacing:.08em;text-align:center;line-height:1.8;
}

/* AR */
#ar{position:fixed;inset:0;z-index:20;display:none;background:#000;}
#ar.show{display:block;}
#arVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#arCanvas{position:absolute;top:0;left:0;}

.ar-top{
  position:absolute;top:0;left:0;right:0;
  padding:max(16px,env(safe-area-inset-top)) 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(rgba(0,0,0,.5),transparent);
  pointer-events:auto;z-index:5;
}
.ar-logo{font-family:'DM Mono',monospace;font-size:.95rem;color:#00ffe0;letter-spacing:.08em;text-shadow:0 0 16px rgba(0,255,224,.5);}
.ar-logo em{font-style:normal;color:rgba(255,255,255,.4);}
.btn-close{
  width:36px;height:36px;background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.15);border-radius:50%;
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);
}

.ar-bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 24px max(20px,env(safe-area-inset-bottom));
  background:linear-gradient(transparent,rgba(0,0,0,.65));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  z-index:5;pointer-events:auto;
}
.ar-bottom-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.gesture-hint{
  font-family:'DM Mono',monospace;font-size:.57rem;
  color:rgba(255,255,255,.45);letter-spacing:.05em;text-align:center;
  transition:opacity .8s;
}
.gesture-hint.fade{opacity:0;}
.obj-count{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(0,255,224,.6);}

.btn-ar{
  width:48px;height:48px;background:rgba(0,0,0,.5);
  border:1.5px solid rgba(255,255,255,.15);border-radius:50%;
  color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all .15s;flex-shrink:0;
}
.btn-ar:active{background:rgba(255,255,255,.15);}

.btn-rec{
  width:56px;height:56px;background:rgba(0,0,0,.5);
  border:2px solid rgba(255,255,255,.2);border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all .15s;flex-shrink:0;
}
.btn-rec-dot{width:22px;height:22px;background:#ff3b30;border-radius:50%;transition:all .2s;}
.btn-rec.recording .btn-rec-dot{border-radius:4px;animation:prec .8s infinite;}
@keyframes prec{0%,100%{opacity:1}50%{opacity:.4}}
.btn-rec:active{transform:scale(.93);}

.rec-badge{
  position:absolute;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:rgba(200,40,30,.88);border-radius:20px;padding:4px 14px;
  font-family:'DM Mono',monospace;font-size:.65rem;color:#fff;letter-spacing:.06em;
  display:none;align-items:center;gap:6px;backdrop-filter:blur(8px);z-index:6;
}
.rec-dot-live{width:7px;height:7px;border-radius:50%;background:#fff;animation:prec .8s infinite;}
.rec-badge.show{display:flex;}

#toast{
  position:fixed;bottom:calc(max(20px,env(safe-area-inset-bottom)) + 100px);
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(15,15,15,.92);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-family:'DM Mono',monospace;font-size:.72rem;
  padding:10px 18px;border-radius:10px;
  opacity:0;transition:all .3s;pointer-events:none;z-index:100;
  white-space:nowrap;backdrop-filter:blur(12px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#ssPopup{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#ssPopup.show{display:flex;}
#ssImg{max-width:90vw;max-height:65vh;border-radius:12px;border:1px solid rgba(255,255,255,.12);}
.ss-btns{display:flex;gap:10px;}
.ss-btn{padding:12px 28px;border-radius:10px;font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer;border:none;}
.ss-btn.dl{background:#00ffe0;color:#000;font-weight:500;}
.ss-btn.cl{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
</style>
</head>
<body>

<div id="home">
  <div class="logo-wrap">
    <div class="logo-main">AR<em>.</em>FLASH</div>
    <div class="logo-sub">Instant AR Experience</div>
  </div>
  <button class="btn-sample" id="btnSample">
    <span class="s-icon">🦕</span>
    <span class="s-label">
      <span class="s-main">サンプルでARを試す</span>
      <span class="s-sub">T-Rex · タップで即AR起動</span>
    </span>
  </button>
  <div class="divider"><span>または</span></div>
  <button class="btn-upload" id="btnUpload">
    <span style="font-size:1.1rem">🖼</span>
    自分の画像をARにする
  </button>
  <input type="file" id="fileInput" accept="image/*">
  <p class="hint">長押しで移動 · ピンチでサイズ変更<br>タップで追加配置</p>
</div>

<div id="ar">
  <video id="arVideo" autoplay muted playsinline></video>
  <canvas id="arCanvas"></canvas>

  <div class="ar-top">
    <div class="ar-logo">AR<em>.</em>FLASH</div>
    <button class="btn-close" id="btnClose">✕</button>
  </div>

  <div class="rec-badge" id="recBadge">
    <div class="rec-dot-live"></div>
    <span id="recTime">00:00</span>
  </div>

  <div class="ar-bottom">
    <button class="btn-ar" id="btnChangeImg">🖼</button>
    <div class="ar-bottom-center">
      <div class="gesture-hint" id="gestureHint">長押し:移動 · ピンチ:サイズ · タップ:追加</div>
      <div class="obj-count" id="objCount"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <button class="btn-ar" id="btnShot">📸</button>
      <button class="btn-rec" id="btnRec"><div class="btn-rec-dot"></div></button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="ssPopup">
  <img id="ssImg" alt="">
  <div class="ss-btns">
    <a class="ss-btn dl" id="ssDl" download="ar-flash.png">💾 保存</a>
    <button class="ss-btn cl" id="ssCl">閉じる</button>
  </div>
</div>

<script>
'use strict';
const SAMPLE_URL = 'https://nippon-jp.github.io/AR/T-Rex.PNG';
let imgEl=null, arStream=null, arRunning=false, arTime=0, rafId=null;
let objects=[], objSeed=0;
const g={longTimer:null,isDragging:false,dragObj:null,dragX0:0,dragY0:0,
  dragObjX0:0,dragObjY0:0,pinchObj:null,pinchDist0:0,pinchSize0:0,
  tapX:0,tapY:0,tapObj:null,lastTap:0,tiltX:0,tiltY:0,ring:null};
const rec={active:false,mr:null,chunks:[],timer:null,t0:0,_rid:null};

function toast(msg,ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function loadImg(src){
  return new Promise((ok,ng)=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>ok(im); im.onerror=()=>ng(); im.src=src;
  });
}
function updateCount(){
  document.getElementById('objCount').textContent=objects.length?objects.length+' 個配置中':'';
}
function addObject(x,y){
  const c=document.getElementById('arCanvas');
  const base=Math.min(c.width,c.height);
  objects.push({id:++objSeed,x,y,size:base*.38,bob:Math.random()*Math.PI*2,img:imgEl});
  updateCount();
  g.ring={x,y,born:arTime};
}
function getObjAt(x,y){
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i],hw=o.size/2;
    if(x>=o.x-hw&&x<=o.x+hw&&y>=o.y-hw&&y<=o.y+hw)return o;
  }
  return null;
}

/* ── START AR ── */
async function startAR(src){
  toast('読み込み中…');
  try{ imgEl=await loadImg(src); }catch(e){ toast('⚠ 画像の読み込みに失敗しました'); return; }
  try{
    arStream=await navigator.mediaDevices.getUserMedia(
      {video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
  }catch(e){ toast('カメラの許可が必要です'); return; }
  if(typeof DeviceOrientationEvent?.requestPermission==='function')
    try{await DeviceOrientationEvent.requestPermission();}catch(e){}
  const video=document.getElementById('arVideo');
  video.srcObject=arStream; await video.play();
  const canvas=document.getElementById('arCanvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  document.getElementById('home').classList.add('hide');
  document.getElementById('ar').classList.add('show');
  objects=[]; arRunning=true; arTime=0;
  addObject(canvas.width/2, canvas.height/2);
  setTimeout(()=>document.getElementById('gestureHint').classList.add('fade'),4000);
  initGestures(canvas);
  renderLoop(canvas);
  toast('タップで追加 · 長押しで移動');
}
async function swapImg(src){
  try{const im=await loadImg(src);imgEl=im;objects.forEach(o=>o.img=im);toast('✓ 画像を変更しました');}
  catch(e){toast('⚠ 読み込み失敗');}
}
function closeAR(){
  stopRec(); arRunning=false;
  if(rafId)cancelAnimationFrame(rafId);
  if(arStream){arStream.getTracks().forEach(t=>t.stop());arStream=null;}
  objects=[];
  document.getElementById('ar').classList.remove('show');
  document.getElementById('home').classList.remove('hide');
  document.getElementById('gestureHint').classList.remove('fade');
  updateCount();
}

/* ── RENDER ── */
function renderLoop(canvas){
  const ctx=canvas.getContext('2d');
  const glowCache=new Map();
  function getGlow(sz){
    const k=Math.round(sz/8)*8;
    if(!glowCache.has(k)){
      const oc=document.createElement('canvas'); oc.width=oc.height=k*2;
      const ox=oc.getContext('2d');
      const gr=ox.createRadialGradient(k,k,0,k,k,k);
      gr.addColorStop(0,'rgba(0,255,224,.18)');
      gr.addColorStop(.6,'rgba(0,255,224,.04)');
      gr.addColorStop(1,'transparent');
      ox.fillStyle=gr; ox.fillRect(0,0,k*2,k*2);
      glowCache.set(k,oc);
    }
    return glowCache.get(k);
  }
  function frame(){
    if(!arRunning)return;
    rafId=requestAnimationFrame(frame);
    arTime+=1/60;
    const t=arTime,W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    objects.forEach(obj=>{
      if(!obj.img||!obj.img.complete||!obj.img.naturalWidth)return;
      const bob=Math.sin(t*.9+obj.bob)*5+Math.sin(t*1.4+obj.bob*1.3)*2;
      const tx=g.tiltX*16, ty=g.tiltY*12;
      const px=obj.x+tx, py=obj.y+ty+bob, hw=obj.size/2;
      ctx.save(); ctx.translate(px,py);
      // glow
      const gc=getGlow(obj.size); ctx.globalAlpha=.85;
      ctx.drawImage(gc,-obj.size,-obj.size); ctx.globalAlpha=1;
      // shadow + image
      ctx.shadowColor='rgba(0,0,0,.65)'; ctx.shadowBlur=28; ctx.shadowOffsetY=14;
      ctx.drawImage(obj.img,-hw,-hw,obj.size,obj.size);
      ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      // border
      ctx.strokeStyle='rgba(0,255,224,.55)'; ctx.lineWidth=1.5;
      ctx.strokeRect(-hw,-hw,obj.size,obj.size);
      // corners
      const cl=12; ctx.strokeStyle='rgba(0,255,224,.9)'; ctx.lineWidth=2.5;
      [[-hw,-hw,1,1],[hw,-hw,-1,1],[-hw,hw,1,-1],[hw,hw,-1,-1]].forEach(([cx,cy,sx,sy])=>{
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+sx*cl,cy);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+sy*cl);ctx.stroke();
      });
      // drag highlight
      if(g.isDragging&&g.dragObj===obj){ctx.fillStyle='rgba(0,255,224,.07)';ctx.fillRect(-hw,-hw,obj.size,obj.size);}
      ctx.restore();
      // ground shadow
      ctx.save(); ctx.globalAlpha=.1; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(px,obj.y+hw*.95+ty,hw*.5,hw*.07,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    // ring
    if(g.ring){
      const age=t-g.ring.born, r=age*110+8, a=Math.max(0,.75-age*1.5);
      if(a>0){ctx.strokeStyle=`rgba(0,255,224,${a})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(g.ring.x,g.ring.y,r,0,Math.PI*2);ctx.stroke();}
      else g.ring=null;
    }
    // guide (no objects)
    if(!objects.length){
      const pr=(t%1.6)*55+10, pa=Math.max(0,.6-(t%1.6)/.8*.6);
      ctx.strokeStyle=`rgba(0,255,224,${pa*.5})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(W/2,H/2,pr,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(0,255,224,.28)';ctx.lineWidth=1;
      [[W/2-16,H/2,W/2+16,H/2],[W/2,H/2-16,W/2,H/2+16]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      });
    }
  }
  frame();
}

/* ── GESTURES ── */
function initGestures(canvas){
  const LPRESS=320;
  function cancelLong(){if(g.longTimer){clearTimeout(g.longTimer);g.longTimer=null;}}

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length>=2){
      cancelLong();
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      g.pinchDist0=Math.hypot(dx,dy);
      const r=canvas.getBoundingClientRect();
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
      g.pinchObj=getObjAt(mx,my)||objects[objects.length-1]||null;
      g.pinchSize0=g.pinchObj?g.pinchObj.size:0;
      return;
    }
    const r=canvas.getBoundingClientRect();
    const x=e.touches[0].clientX-r.left, y=e.touches[0].clientY-r.top;
    g.tapX=x; g.tapY=y; g.tapObj=getObjAt(x,y);
    const now=Date.now();
    if(now-g.lastTap<280&&!g.tapObj){g.lastTap=0;addObject(x,y);return;}
    g.lastTap=now;
    if(g.tapObj){
      g.longTimer=setTimeout(()=>{
        g.longTimer=null; g.isDragging=true; g.dragObj=g.tapObj;
        g.dragX0=x;g.dragY0=y;g.dragObjX0=g.tapObj.x;g.dragObjY0=g.tapObj.y;
      },LPRESS);
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>=2&&g.pinchObj){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      g.pinchObj.size=Math.max(40,g.pinchSize0*(Math.hypot(dx,dy)/g.pinchDist0));
      return;
    }
    if(g.isDragging&&g.dragObj){
      const r=canvas.getBoundingClientRect();
      g.dragObj.x=g.dragObjX0+(e.touches[0].clientX-r.left-g.dragX0);
      g.dragObj.y=g.dragObjY0+(e.touches[0].clientY-r.top-g.dragY0);
      return;
    }
    if(g.longTimer){
      const r=canvas.getBoundingClientRect();
      const dx=e.touches[0].clientX-r.left-g.tapX;
      const dy=e.touches[0].clientY-r.top-g.tapY;
      if(Math.hypot(dx,dy)>8)cancelLong();
    }
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    if(e.touches.length<2)g.pinchObj=null;
    g.isDragging=false; g.dragObj=null;
    if(g.longTimer){cancelLong();if(!g.tapObj)addObject(g.tapX,g.tapY);}
  },{passive:false});

  // mouse
  let mDown=false,mLTimer=null,mDrag=false;
  canvas.addEventListener('mousedown',e=>{
    mDown=true;const r=canvas.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    g.tapX=x;g.tapY=y;g.tapObj=getObjAt(x,y);
    const now=Date.now();
    if(now-g.lastTap<280&&!g.tapObj){g.lastTap=0;addObject(x,y);return;}
    g.lastTap=now;
    if(g.tapObj){mLTimer=setTimeout(()=>{mLTimer=null;mDrag=true;g.dragObj=g.tapObj;g.isDragging=true;
      g.dragX0=x;g.dragY0=y;g.dragObjX0=g.tapObj.x;g.dragObjY0=g.tapObj.y;canvas.style.cursor='grabbing';},320);}
  });
  canvas.addEventListener('mousemove',e=>{
    if(!mDown)return;const r=canvas.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    if(mDrag&&g.dragObj){g.dragObj.x=g.dragObjX0+(x-g.dragX0);g.dragObj.y=g.dragObjY0+(y-g.dragY0);}
    else if(mLTimer&&Math.hypot(x-g.tapX,y-g.tapY)>8){clearTimeout(mLTimer);mLTimer=null;}
  });
  canvas.addEventListener('mouseup',e=>{
    mDown=false;canvas.style.cursor='crosshair';
    if(mLTimer){clearTimeout(mLTimer);mLTimer=null;
      if(!g.tapObj){const r=canvas.getBoundingClientRect();addObject(e.clientX-r.left,e.clientY-r.top);}}
    mDrag=false;g.isDragging=false;g.dragObj=null;
  });
  window.addEventListener('deviceorientation',e=>{
    g.tiltX=(e.gamma||0)/90;g.tiltY=((e.beta||45)-45)/90;
  });
}

/* ── SCREENSHOT ── */
document.getElementById('btnShot').addEventListener('click',()=>{
  const v=document.getElementById('arVideo'),ac=document.getElementById('arCanvas');
  const oc=document.createElement('canvas');oc.width=ac.width;oc.height=ac.height;
  const ox=oc.getContext('2d');ox.drawImage(v,0,0,ac.width,ac.height);ox.drawImage(ac,0,0);
  const url=oc.toDataURL('image/png');
  document.getElementById('ssImg').src=url;
  document.getElementById('ssDl').href=url;
  document.getElementById('ssPopup').classList.add('show');
});
document.getElementById('ssCl').addEventListener('click',()=>document.getElementById('ssPopup').classList.remove('show'));

/* ── RECORDING ── */
document.getElementById('btnRec').addEventListener('click',()=>rec.active?stopRec():startRec());
function startRec(){
  const v=document.getElementById('arVideo'),ac=document.getElementById('arCanvas');
  const oc=document.createElement('canvas');oc.width=ac.width;oc.height=ac.height;
  const ox=oc.getContext('2d');
  function cf(){ox.drawImage(v,0,0,ac.width,ac.height);ox.drawImage(ac,0,0);rec._rid=requestAnimationFrame(cf);}
  rec._rid=requestAnimationFrame(cf);
  const mime=['video/mp4','video/webm;codecs=vp9','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
  rec.mr=new MediaRecorder(oc.captureStream(30),{mimeType:mime});
  rec.chunks=[];
  rec.mr.ondataavailable=e=>{if(e.data.size>0)rec.chunks.push(e.data);};
  rec.mr.onstop=()=>{
    cancelAnimationFrame(rec._rid);
    const ext=mime.includes('mp4')?'mp4':'webm';
    const blob=new Blob(rec.chunks,{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`ar-flash-${Date.now()}.${ext}`;a.click();
    URL.revokeObjectURL(url);
  };
  rec.mr.start(100);rec.active=true;rec.t0=Date.now();
  document.getElementById('btnRec').classList.add('recording');
  document.getElementById('recBadge').classList.add('show');
  rec.timer=setInterval(()=>{
    const s=Math.floor((Date.now()-rec.t0)/1000);
    document.getElementById('recTime').textContent=
      String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
  toast('● 録画開始');
}
function stopRec(){
  if(!rec.active)return;
  if(rec.mr&&rec.mr.state!=='inactive')rec.mr.stop();
  clearInterval(rec.timer);rec.active=false;
  document.getElementById('btnRec').classList.remove('recording');
  document.getElementById('recBadge').classList.remove('show');
  toast('録画を保存しました');
}

/* ── WIRING ── */
document.getElementById('btnSample').addEventListener('click',()=>startAR(SAMPLE_URL));
document.getElementById('btnUpload').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>startAR(ev.target.result);r.readAsDataURL(f);
  e.target.value='';
});
document.getElementById('btnChangeImg').addEventListener('click',()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>swapImg(ev.target.result);r.readAsDataURL(f);};
  inp.click();
});
document.getElementById('btnClose').addEventListener('click',closeAR);
window.addEventListener('resize',()=>{
  if(!arRunning)return;
  const c=document.getElementById('arCanvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
});
</script>
